    :root {
      --navy:       #0F153F;
      --navy-card:  #1a2258;
      --navy-hover: #1e2a6a;
      --gold:       #C9A96E;
      --gold-light: #E8C98A;
      --white:      #F4F1EB;
      --white-soft: rgba(244,241,235,0.7);
      --divider:    rgba(201,169,110,0.2);
      --shadow:     rgba(0,0,0,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background-color: var(--navy);
    }

    body {
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 72px;
      position: relative;
      overflow-x: hidden;
    }

    /* Fondo con gradiente sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,169,110,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 110%, rgba(13,27,46,0.9) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
      text-align: center;
    }

    .avatar-wrapper {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .avatar-wrapper::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
      z-index: 0;
    }

    .avatar {
      position: relative;
      z-index: 1;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      object-position: 60% top;
      border: 3px solid var(--navy);
      display: block;
    }

    .name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .tagline {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .divider-line {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-top: 4px;
    }

    /* ── LINKS ── */
    .links-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--navy-card);
      border: 1px solid var(--divider);
      border-radius: 14px;
      text-decoration: none;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,169,110,0.05) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .link-card:hover {
      background: var(--navy-hover);
      border-color: rgba(201,169,110,0.45);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--shadow);
    }

    .link-card:hover::before { opacity: 1; }

    .link-card:active { transform: translateY(0); }

    .icon-wrap {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: rgba(201,169,110,0.1);
      border: 1px solid rgba(201,169,110,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 20px;
      height: 20px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .link-text {
      flex: 1;
    }

    .link-label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .link-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--white);
      line-height: 1.3;
    }

    .link-arrow {
      color: var(--gold);
      opacity: 0.5;
      font-size: 1rem;
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .link-card:hover .link-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 44px;
      text-align: center;
    }

    .footer-handle {
      font-size: 0.72rem;
      color: var(--white-soft);
      letter-spacing: 0.12em;
    }

    .footer-handle span {
      color: var(--gold);
    }
  </style>
</head>
