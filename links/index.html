<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asesor Landero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1B2A4A;
      --pantone: #0E1F45;
      --gold: #C9A96E;
      --gold-light: #E8C98A;
      --white: #F4F1EB;
      --white-soft: rgba(244, 241, 235, 0.85);
      --divider: rgba(201, 169, 110, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background-color: var(--pantone);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(201,169,110,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201,169,110,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo-wrap {
      width: 88px;
      height: 88px;
      margin-bottom: 20px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      mix-blend-mode: normal;
    }

    /* Name */
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--white);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    .brand-tagline {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s 0.15s ease both;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom: 36px;
      animation: fadeIn 0.8s 0.2s ease both;
    }

    /* Link card */
    .link-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,169,110,0.18);
      border-radius: 4px;
      text-decoration: none;
      color: var(--white);
      margin-bottom: 12px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gold);
      transform: scaleY(0);
      transition: transform 0.25s ease;
      transform-origin: bottom;
    }

    .link-card:hover {
      background: rgba(201,169,110,0.08);
      border-color: rgba(201,169,110,0.45);
      transform: translateX(4px);
    }

    .link-card:hover::before {
      transform: scaleY(1);
    }

    .link-icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(201,169,110,0.12);
      border: 1px solid rgba(201,169,110,0.25);
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
      fill: var(--gold);
    }

    .link-text {
      flex: 1;
    }

    .link-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-transform: uppercase;
      display: block;
      margin-bottom: 2px;
    }

    .link-desc {
      font-size: 15px;
      font-weight: 400;
      color: var(--white-soft);
      letter-spacing: 0.02em;
    }

    .link-arrow {
      color: rgba(201,169,110,0.4);
      font-size: 18px;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .link-card:hover .link-arrow {
      color: var(--gold);
      transform: translateX(3px);
    }

    /* Animation stagger for cards */
    .link-card:nth-child(1) { animation: slideUp 0.5s 0.3s ease both; }
    .link-card:nth-child(2) { animation: slideUp 0.5s 0.4s ease both; }
    .link-card:nth-child(3) { animation: slideUp 0.5s 0.5s ease both; }
    .link-card:nth-child(4) { animation: slideUp 0.5s 0.6s ease both; }

    /* Footer */
    .footer {
      margin-top: 44px;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(244,241,235,0.25);
      text-transform: uppercase;
      text-align: center;
      animation: fadeIn 1s 0.8s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
